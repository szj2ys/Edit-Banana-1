# Fly.io configuration for EditBanana Backend
# Deploy with: fly deploy

app = 'editbanana-api'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-2x'
  memory = '2gb'

# Health check
[[services.http_checks]]
  interval = 30000
  timeout = 10000
  grace_period = '60s'
  method = 'get'
  path = '/health'
  protocol = 'http'
  tls_skip_verify = false
  [services.http_checks.headers]
